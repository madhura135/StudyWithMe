<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign In-StudyWithMe</title>

    <!-- Your CSS file -->
    <link rel="stylesheet" href="SignIn.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito&family=Caveat&display=swap" rel="stylesheet">
</head>

<body>
    <nav>🔥 5,000+ students staying consistent daily.
🚀 Upgrade to premium at just ₹69/month.
🏆 Track your streak. Beat distractions.</nav>

    <!-- Main container (2 sections: left = images, right = form) -->
    <main class="columns">

        <!-- 🔹 LEFT SIDE → Polaroid Image Grid -->
        <div class="grid-container">

            <!-- Each "poster" is a polaroid card -->
            <!-- Image + caption (your app message) -->

             <div class="poster">
                 <p>Don’t study alone anymore !!</p>
            <img src="../images/group4.png" alt="motivation">
              
            </div>
              <!-- <p>Stay focused & study smart </p> -->
     
        </div>
        <!-- 🔹 RIGHT SIDE → Login Form -->
        <div class="form">

            <div class="login-box">
                <div id="study"><img src="../images/StudyWithMe_Logo.png"></div>

                <!-- UserName input -->
                <input type="text" name="text" placeholder="Name" autofocus>

                <!-- Email input -->
                <input type="email" placeholder="Email address or phone number" autofocus required>

                <!-- Password input -->
                <input type="password" placeholder="Password">
                <!-- <span id="togglePassword">Show</span> TO BE CHECKED-->

                <!-- Login button -->
                <button class="login-btn">Sign In</button>

                <!-- Forgot password -->
                <a href="./Forgot.html" class="forgot">Forgot Password?</a>

                <hr>

                <!-- Create account -->
                <a href="./SignUp.html" class="create-account">Create new account</a>

            </div>

        </div>

    </main>

</body>

</html>
