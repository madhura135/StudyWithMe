<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudyWithMe - Login</title>

    <!-- Your CSS file -->
    <link rel="stylesheet" href="SignIn.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito&family=Caveat&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Main container (2 sections: left = images, right = form) -->
    <main class="columns">

        <!-- 🔹 LEFT SIDE → Polaroid Image Grid -->
        <div class="grid-container">

            <!-- Each "poster" is a polaroid card -->
            <!-- Image + caption (your app message) -->

            <div class="poster">
                <img src="../images/Log_1.jpg" alt="Studying Cat">
                <p>Stay focused & study smart ✨</p>
            </div>

            <div class="poster">
                <img src="../images/track3.jpg" alt="Progress Tracking">
                <p>Track your daily goals 📊</p>
            </div>

            <div class="poster">
                <img src="../images/group.jpg" alt="Community">
                <p>Study together, grow together 🤝</p>
            </div>

            <div class="poster">
                <img src="../images/Log_6.jpg" alt="Consistency">
                <p>Consistency builds success 💪</p>
            </div>

        </div>

        <!-- 🔹 RIGHT SIDE → Login Form -->
        <div class="form">
            
            <div class="login-box">
                <div id="study"><img src="../images/StudyWithMe_Logo.png"></div>
               
                <!-- Email input -->
                <input type="email" placeholder="Email address or phone number" autofocus required>

                <!-- Password input -->
                <input type="password" placeholder="Password">
                <!-- <span id="togglePassword">Show</span> TO BE CHECKED-->

                <!-- Login button -->
                <button class="login-btn">Log in</button>

                <!-- Forgot password -->
                <a href="./Forgot.html" class="forgot">Forgot password?</a>

                <hr>

                <!-- Create account -->
                <a href="./SignUp.html" class="create-account">Create new account</a>

            </div>

        </div>

    </main>

</body>
</html>
